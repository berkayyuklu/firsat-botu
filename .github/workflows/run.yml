name: Gunluk Firsat Kontrolü
on:
  workflow_dispatch: # Bu satır "Run workflow" butonunu çıkarır
  schedule:
    - cron: '0 9 * * *' # Her sabah 09:00'da çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Python Kur
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4
      - name: Botu Çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
